<!DOCTYPE html>
<html>
  <head>
    <title>Tina CMS</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@tinacms/auth@1.1.0/dist/index.global.js"></script>
    <script src="https://unpkg.com/tinacms@2.8.1/dist/tinacms.min.js"></script>
    <script>
      const tina = new window.TinaCMS({
        enabled: true,
        sidebar: true,
        apis: {
          github: new window.TinaCMS.GitHub({
            clientId: 'Ov23liyrcFGHuoQ2clmp',
            owner: 'myproxynetwork',
            repo: 'my-knowledge-base',
            branch: 'main'
          })
        }
      });
      tina.registerPlugin({
        __type: 'content-creator',
        name: 'Create New Document',
        fields: [
          { name: 'id', label: 'ID', type: 'string' },
          { name: 'title', label: 'Заголовок', type: 'string' },
          { name: 'body', label: 'Тело документа', type: 'rich-text' }
        ],
        onSubmit: async (values) => {
          await tina.apis.github.createDocument({
            collection: 'docs',
            path: `docs/${values.id}.md`,
            content: `---\nid: ${values.id}\ntitle: ${values.title}\n---\n${values.body}`
          });
        }
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
